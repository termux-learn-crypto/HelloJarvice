name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Generate keystore
        run: |
          KEYSTORE_PASS=$(tr -dc 'a-zA-Z0-9' < /dev/urandom | head -c 16)
          KEY_PASS=$(tr -dc 'a-zA-Z0-9' < /dev/urandom | head -c 16)
          keytool -genkeypair -v -keystore android/hello-jarvice.jks -alias jarvice -keyalg RSA -keysize 2048 -validity 10000 -storepass "$KEYSTORE_PASS" -keypass "$KEY_PASS" -dname "CN=HeyMery, OU=Dev, O=HeyMery, L=Delhi, ST=Delhi, C=IN"
          echo "KEYSTORE_PASS=$KEYSTORE_PASS" >> "$GITHUB_ENV"
          echo "KEY_PASS=$KEY_PASS" >> "$GITHUB_ENV"

      - name: Create key.properties
        run: |
          printf 'storePassword=%s\n' "$KEYSTORE_PASS" > android/key.properties
          printf 'keyPassword=%s\n' "$KEY_PASS" >> android/key.properties
          printf 'keyAlias=jarvice\n' >> android/key.properties
          printf 'storeFile=hello-jarvice.jks\n' >> android/key.properties

      - name: Install dependencies
        run: flutter pub get

      - name: Run tests
        run: flutter test

      - name: Build APK (split per ABI)
        run: flutter build apk --release --split-per-abi --obfuscate --split-debug-info=build/debug-info

      - name: Upload arm64-v8a APK
        uses: actions/upload-artifact@v4
        with:
          name: HelloJarvice-arm64-v8a
          path: build/app/outputs/flutter-apk/app-arm64-v8a-release.apk

      - name: Upload armeabi-v7a APK
        uses: actions/upload-artifact@v4
        with:
          name: HelloJarvice-armeabi-v7a
          path: build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
