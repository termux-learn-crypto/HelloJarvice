name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Generate keystore
        run: keytool -genkeypair -v -keystore android/hello-jarvice.jks -alias jarvice -keyalg RSA -keysize 2048 -validity 10000 -storepass jarvice123 -keypass jarvice123 -dname "CN=HeyMery, OU=Dev, O=HeyMery, L=Delhi, ST=Delhi, C=IN"

      - name: Create key.properties
        run: |
          echo "storePassword=jarvice123" > android/key.properties
          echo "keyPassword=jarvice123" >> android/key.properties
          echo "keyAlias=jarvice" >> android/key.properties
          echo "storeFile=hello-jarvice.jks" >> android/key.properties

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: HelloJarvice-APK
          path: build/app/outputs/flutter-apk/app-release.apk
